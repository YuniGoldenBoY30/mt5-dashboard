<VirtualHost *:80>
    ServerName trading.zenitech.ai
    
    # Redirigir todo el tráfico HTTP a HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName trading.zenitech.ai

    # ── Configuración SSL (Reemplaza con tus rutas reales de Certbot/Let's Encrypt) ──
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/trading.zenitech.ai/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/trading.zenitech.ai/privkey.pem
    
    # Headers de Seguridad Institucional
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set X-Content-Type-Options "nosniff"

    # ── Proxy Inverso al Frontend (Docker localhost:8082) ──
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8082/
    ProxyPassReverse / http://127.0.0.1:8082/

    # ── Proxy Inverso a la API Backend (Docker localhost:8000) ──
    # Nota: Como quitamos el puerto 8000 público en docker-compose.prod.yml, 
    # necesitamos asegurar que el Frontend hable con la API a través de Apache,
    # o bien exponer el backend internamente a localhost:8000.
    # En nuestra configuración prod actual, el frontend ya enruta /api hacia el backend 
    # internamente usando la red de Docker (gracias a Nginx dentro del contenedor frontend).
    
    # Soporte para WebSockets (Telemetría en tiempo real)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/ws/(.*) ws://127.0.0.1:8082/ws/$1 [P,L]

    ErrorLog ${APACHE_LOG_DIR}/trading_zenitech_error.log
    CustomLog ${APACHE_LOG_DIR}/trading_zenitech_access.log combined
</VirtualHost>
